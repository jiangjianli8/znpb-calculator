name: Update Zn Pb Prices

on:
  schedule:
    - cron: '50,55 0 * * 1-5'
    - cron: '*/5 1-6 * * 1-5'
    - cron: '0,5 7 * * 1-5'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch prices
        run: python3 scripts/fetch-prices.py
      - name: Commit if changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/price.json
          if git diff --staged --quiet; then
            echo "No change"
          else
            git commit -m "Price update: Zn=$(python3 -c "import json;print(int(json.load(open('data/price.json'))['zn']['price']))") Pb=$(python3 -c "import json;print(int(json.load(open('data/price.json'))['pb']['price']))")"
            git push
          fi
