<!DOCTYPE html>

<html lang="zh-CN">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

<title>铅锌矿计价器 · 鑫善源 🟡</title>

<style>

:root {
  --bg: #0a0a0f;
  --card: #1a1a25;
  --card2: #22222e;
  --text: #ffffff;
  --text2: #a0a0c0;
  --primary: #ffd700;
  --primary-light: #c0c0c0;
  --primary-dark: #daa520;
  --gold: #c0c0c0;
  --accent: #ffaa00;
  --danger: #ff4466;
  --border: #2a2a3a;
  --radius: 16px;
  --radius-sm: 10px;
}

* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  padding: 16px;
  position: relative;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: 
    radial-gradient(circle at 20% 30%, rgba(155, 0, 255, 0.05) 0%, transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(0, 45, 255, 0.05) 0%, transparent 40%);
  pointer-events: none;
  z-index: 0;
  animation: bgFloat 20s ease-in-out infinite;
}

@keyframes bgFloat {
  0%, 100% { transform: translate(0, 0); }
  50% { transform: translate(1%, -1%); }
}

.container { width:100%; max-width:520px; position: relative; z-index: 1; }

.header {
  text-align: center;
  padding: 24px 0 20px;
}

.header h1 {
  font-size: 2rem;
  font-weight: 900;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: 1px;
}

.header .subtitle {
  font-size: 0.8rem;
  color: var(--text2);
  margin-top: 6px;
  letter-spacing: 1px;
}

.header .source-dot {
  display: inline-block;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  vertical-align: middle;
  margin-right: 4px;
}

.header .source-dot.live {
  background: #00ff88;
  box-shadow: 0 0 10px #00ff88;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.price-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.08), rgba(199,62,29,0.06));
  border: 1px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 18px 20px;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
  backdrop-filter: blur(10px);
}

.price-card::before {
  content: '';
  position: absolute;
  top: -50%;
  right: -30%;
  width: 140px;
  height: 140px;
  background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
  opacity: 0.12;
  border-radius: 50%;
  animation: priceGlow 4s ease-in-out infinite;
}

@keyframes priceGlow {
  0%, 100% { transform: scale(1); opacity: 0.08; }
  50% { transform: scale(1.1); opacity: 0.15; }
}

.price-label {
  font-size: 0.75rem;
  color: var(--primary-light);
  text-transform: uppercase;
  letter-spacing: 2px;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.price-label .dot {
  width: 8px; height: 8px;
  background: #00ff88;
  border-radius: 50%;
  animation: pulse 2s infinite;
  box-shadow: 0 0 8px #00ff88;
}

.price-value {
  font-size: 2.2rem;
  font-weight: 800;
  color: var(--primary-light);
  line-height: 1;
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.price-value .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
  margin-left: 4px;
  -webkit-text-fill-color: var(--text2);
}

.price-meta {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 8px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.refresh-btn {
  background: rgba(255,107,53,0.15);
  border: 1px solid var(--primary-dark);
  color: var(--primary-light);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.3s;
  font-weight: 600;
}

.refresh-btn:hover {
  background: rgba(255,107,53,0.25);
  box-shadow: 0 0 15px rgba(255,107,53,0.3);
}

.refresh-btn:active { transform: scale(0.95); }

.manual-price {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 12px;
  font-size: 0.75rem;
}

.manual-price input {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 6px 10px;
  border-radius: 8px;
  width: 120px;
  font-size: 0.8rem;
  text-align: center;
}

.manual-price input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.manual-price button {
  background: var(--primary-dark);
  border: none;
  color: #fff;
  padding: 6px 14px;
  border-radius: 8px;
  font-size: 0.7rem;
  cursor: pointer;
  font-weight: 600;
}

.manual-price .toggle {
  font-size: 0.65rem;
  color: var(--primary-light);
  cursor: pointer;
  text-decoration: underline;
}

.calc-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 20px;
  margin-bottom: 16px;
  transition: all 0.3s;
}

.calc-card:hover {
  border-color: var(--primary-dark);
  box-shadow: 0 0 20px rgba(255,107,53,0.1);
}

.calc-card h2 {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--text2);
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.calc-card h2::before {
  content: '';
  width: 3px;
  height: 16px;
  background: linear-gradient(180deg, var(--primary), var(--primary-light));
  border-radius: 2px;
}

.calc-card h2 .icon { font-size: 1.2rem; }

.grade-section { margin-bottom: 20px; }

.grade-label {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 10px;
}

.grade-label .name { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.grade-label .value {
  font-size: 1.8rem;
  font-weight: 800;
  color: var(--primary-light);
  background: linear-gradient(135deg, var(--primary-light), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.grade-label .value .pct {
  font-size: 1rem;
  color: var(--text2);
  -webkit-text-fill-color: var(--text2);
}

.slider-wrap {
  position: relative;
  padding: 8px 0;
}

input[type=range] {
  -webkit-appearance: none;
  width: 100%;
  height: 10px;
  border-radius: 5px;
  background: linear-gradient(90deg, var(--primary-dark), var(--primary), var(--gold));
  outline: none;
}

input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 32px; height: 32px;
  border-radius: 50%;
  background: var(--primary-light);
  border: 3px solid #fff;
  cursor: pointer;
  box-shadow: 0 2px 12px var(--primary);
  transition: all 0.2s;
}

input[type=range]::-webkit-slider-thumb:hover {
  transform: scale(1.1);
  box-shadow: 0 4px 20px var(--primary);
}

.grade-ticks {
  display: flex;
  justify-content: space-between;
  font-size: 0.65rem;
  color: var(--text2);
  padding: 4px 8px 0;
}

.grade-presets {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 12px;
}

.grade-presets button {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 0.7rem;
  cursor: pointer;
  transition: all 0.2s;
  font-weight: 600;
}

.grade-presets button:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.1);
}

.grade-presets button.active {
  background: rgba(255,107,53,0.2);
  border-color: var(--primary);
  color: var(--primary-light);
  box-shadow: 0 0 10px rgba(255,107,53,0.2);
}

.coeff-display {
  background: var(--card2);
  border-radius: var(--radius-sm);
  padding: 14px 18px;
  margin-bottom: 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border: 1px solid var(--border);
}

.coeff-display .label { font-size: 0.8rem; color: var(--text2); letter-spacing: 0.5px; }

.coeff-display .value {
  font-size: 1.5rem;
  font-weight: 800;
  color: var(--accent);
  text-shadow: 0 0 10px rgba(0,240,255,0.2);
}

.result-card {
  background: linear-gradient(135deg, rgba(255,107,53,0.1), rgba(199,62,29,0.08));
  border: 2px solid var(--primary-dark);
  border-radius: var(--radius);
  padding: 24px 20px;
  text-align: center;
  margin-bottom: 16px;
  position: relative;
  overflow: hidden;
}

.result-card::before {
  content: '';
  position: absolute;
  top: -50%;
  left: 50%;
  transform: translateX(-50%);
  width: 200px;
  height: 200px;
  background: radial-gradient(circle, var(--gold) 0%, transparent 70%);
  opacity: 0.08;
  border-radius: 50%;
}

.result-card .label {
  font-size: 0.8rem;
  color: var(--primary-light);
  margin-bottom: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.result-card .value {
  font-size: 2.8rem;
  font-weight: 900;
  color: var(--gold);
  line-height: 1;
  text-shadow: 0 0 20px rgba(255,215,0,0.3);
  position: relative;
  z-index: 1;
}

.result-card .unit {
  font-size: 0.9rem;
  font-weight: 400;
  color: var(--text2);
}

.result-formula {
  font-size: 0.7rem;
  color: var(--text2);
  margin-top: 12px;
  line-height: 1.6;
}

.coeff-table-wrap {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.5s ease;
}

.coeff-table-wrap.open { max-height: 600px; }

.coeff-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.75rem;
  margin-top: 12px;
}

.coeff-table th, .coeff-table td {
  padding: 10px 12px;
  text-align: center;
  border-bottom: 1px solid var(--border);
}

.coeff-table th {
  color: var(--text2);
  font-weight: 600;
  font-size: 0.7rem;
  background: var(--card2);
}

.coeff-table tr:hover td { background: rgba(255,107,53,0.08); }

.coeff-table tr.current td {
  background: rgba(255,107,53,0.18);
  color: var(--primary-light);
  font-weight: 700;
}

.toggle-table-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-top: 10px;
  transition: all 0.2s;
}

.toggle-table-btn:hover {
  border-color: var(--primary);
  color: var(--primary-light);
  background: rgba(255,107,53,0.05);
}

.multi-ores { margin-top: 20px; }

.multi-ores h3 {
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 10px;
  letter-spacing: 0.5px;
}

.ore-row {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-bottom: 8px;
  padding: 12px;
  background: var(--card2);
  border-radius: var(--radius-sm);
  border: 1px solid var(--border);
  transition: all 0.2s;
}

.ore-row:hover {
  border-color: var(--primary-dark);
}

.ore-row .ore-grade {
  flex: 1;
  display: flex;
  align-items: center;
  gap: 6px;
}

.ore-row input {
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 8px;
  border-radius: 8px;
  width: 80px;
  font-size: 0.85rem;
  text-align: center;
  font-weight: 600;
}

.ore-row input:focus {
  outline: none;
  border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(255,107,53,0.15);
}

.ore-row .ore-result {
  font-size: 0.9rem;
  font-weight: 700;
  color: var(--primary-light);
  min-width: 100px;
  text-align: right;
}

.ore-row .ore-del {
  background: none;
  border: none;
  color: var(--danger);
  cursor: pointer;
  font-size: 1.4rem;
  padding: 0 4px;
  line-height: 1;
}

.add-ore-btn {
  width: 100%;
  background: none;
  border: 1px dashed var(--border);
  color: var(--text2);
  padding: 10px;
  border-radius: 10px;
  font-size: 0.7rem;
  cursor: pointer;
  margin-bottom: 10px;
  transition: all 0.2s;
}

.add-ore-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: rgba(0,240,255,0.05);
}

.total-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 18px;
  background: rgba(255,107,53,0.12);
  border-radius: var(--radius-sm);
  border: 1px solid var(--primary-dark);
}

.total-row .label { font-size: 0.85rem; color: var(--primary-light); font-weight: 600; }

.total-row .value {
  font-size: 1.3rem;
  font-weight: 800;
  color: var(--gold);
  text-shadow: 0 0 10px rgba(255,215,0,0.2);
}

.footer {
  text-align: center;
  padding: 20px 16px;
  font-size: 0.7rem;
  color: var(--text2);
  letter-spacing: 1px;
}

.footer span {
  font-weight: 900;
  color: var(--primary);
  font-size: 1.1rem;
}

.price-error {
  color: var(--danger);
  font-size: 0.7rem;
}

</style>

</head>

<body>

<div class="container">

  <div class="header">

    <h1>铅锌矿套保计算器</h1>

    <div class="subtitle" id="subtitle">基于SMM 1#锌锭/1#铅锭现货行情</div>

  </div>



  <!-- Mode -->

  <div class="mode-switch">

    <button class="active" onclick="setMode('zn')">🪙 纯锌矿</button>

    <button onclick="setMode('pb')">🪨 纯铅矿</button>

    <button onclick="setMode('mixed')">⚒️ 铅锌混合矿</button>

  </div>



  <!-- Prices -->

  <div class="refresh-bar"><button onclick="fetchPrices()">🔄 刷新行情</button></div>

  <div class="price-row" id="priceRowZn" style="display:flex">

    <div class="price-card zn">

      <div class="label"><span class="dot live" id="dotZn"></span>SMM 1#锌锭</div>

      <div class="value" id="priceZn">--<span class="unit">元/吨</span></div>

      <div class="meta" id="metaZn"></div>

    </div>

  </div>

  <div class="price-row" id="priceRowPb" style="display:flex">

    <div class="price-card pb">

      <div class="label"><span class="dot live" id="dotPb"></span>SMM 1#铅锭</div>

      <div class="value" id="pricePb">--<span class="unit">元/吨</span></div>

      <div class="meta" id="metaPb"></div>

    </div>

  </div>



  <!-- Calculator -->

  <div class="calc-card">

    <h2>📐 精矿计价</h2>



    <!-- Zn grade -->

    <div class="grade-row" id="gradeRowZn">

      <div class="grade-col zn" style="flex:1">

        <label>锌品位 Zn% <span class="val" id="znGradeVal">50</span>%</label>

        <input type="range" class="zn-range" id="znGrade" min="25" max="60" value="50" step="0.1" oninput="calc()">

      </div>

    </div>

    <div class="presets" id="presetsZn"></div>



    <!-- Pb grade -->

    <div class="grade-row" id="gradeRowPb">

      <div class="grade-col pb" style="flex:1">

        <label>铅品位 Pb% <span class="val" id="pbGradeVal">60</span>%</label>

        <input type="range" class="pb-range" id="pbGrade" min="30" max="80" value="60" step="0.1" oninput="calc()">

      </div>

    </div>

    <div class="presets" id="presetsPb"></div>



    <!-- Coeff + TC -->

    <div class="param-row" id="paramRowZn">

      <div class="param-item"><div class="lbl">锌计价系数</div><div class="v" id="coeffZn">75%</div></div>

      <div class="param-item"><div class="lbl">锌TC (元/金属吨)</div><input type="number" id="tcZn" value="5200" min="4000" max="7000" step="100" oninput="calc()"></div>

    </div>

    <div class="param-row" id="paramRowPb">

      <div class="param-item"><div class="lbl">铅计价系数</div><div class="v" id="coeffPb">75%</div></div>

      <div class="param-item"><div class="lbl">铅TC (元/金属吨)</div><input type="number" id="tcPb" value="500" min="300" max="800" step="50" oninput="calc()"></div>

    </div>



    <!-- Tax toggle -->

    <div class="tax-toggle">

      <label class="switch"><input type="checkbox" id="taxMode" checked onchange="calc()"><span class="slider"></span></label>

      <span id="taxLabel">含税价 → 不含税 (÷1.13)</span>

    </div>

  </div>



  <!-- Result -->

  <div class="result-card">

    <div class="label">💰 精矿单价</div>

    <div class="value" id="orePrice">--<span class="unit">元/吨</span></div>

    <div class="breakdown" id="breakdown"></div>

  </div>



  <div class="footer">

    <span class="brand1">矿链通1.0</span>

    <span class="brand2">-佛山鑫善源</span>

  </div>

</div>



<script>

// ===== Coefficient Tables (corrected per industry standard) =====

var ZN_COEFF = [[25,60],[35,65],[45,70],[50,75],[55,75],[60,75]];

var PB_COEFF = [[30,55],[35,60],[40,65],[50,75],[60,80],[70,88],[80,88]];



var currentMode = 'zn';

var znPrice = 24420, pbPrice = 16260;



// ===== Interpolation =====

function getCoeff(table, grade) {

  if (grade <= table[0][0]) return table[0][1];

  if (grade >= table[table.length-1][0]) return table[table.length-1][1];

  for (var i=0;i<table.length-1;i++) {

    if (grade>=table[i][0] && grade<=table[i+1][0]) {

      var t=(grade-table[i][0])/(table[i+1][0]-table[i][0]);

      return table[i][1]+t*(table[i+1][1]-table[i][1]);

    }

  }

  return table[table.length-1][1];

}



// ===== Mode switch =====

function setMode(mode) {

  currentMode = mode;

  document.querySelectorAll('.mode-switch button').forEach(function(b,i){

    b.classList.toggle('active', (i===0&&mode==='zn')||(i===1&&mode==='pb')||(i===2&&mode==='mixed'));

  });

  var showZn = mode==='zn'||mode==='mixed';

  var showPb = mode==='pb'||mode==='mixed';

  document.getElementById('gradeRowZn').style.display = showZn?'flex':'none';

  document.getElementById('gradeRowPb').style.display = showPb?'flex':'none';

  document.getElementById('presetsZn').style.display = showZn?'flex':'none';

  document.getElementById('presetsPb').style.display = showPb?'flex':'none';

  document.getElementById('paramRowZn').style.display = showZn?'flex':'none';

  document.getElementById('paramRowPb').style.display = showPb?'flex':'none';

  document.getElementById('priceRowZn').style.display = showZn?'flex':'none';

  document.getElementById('priceRowPb').style.display = showPb?'flex':'none';

  document.getElementById('subtitle').textContent = mode==='mixed'?'基于SMM 1#锌锭/1#铅锭现货行情':'基于SMM 1#锌锭/1#铅锭现货行情';

  calc();

}



// ===== Calculation =====

function calc() {

  var znGrade=parseFloat(document.getElementById('znGrade').value);

  var pbGrade=parseFloat(document.getElementById('pbGrade').value);

  var tcZn=parseFloat(document.getElementById('tcZn').value)||5200;

  var tcPb=parseFloat(document.getElementById('tcPb').value)||500;

  var exVat=document.getElementById('taxMode').checked;

  var divider=exVat?1.13:1;

  document.getElementById('taxLabel').textContent=exVat?'含税价 → 不含税 (÷1.13)':'不含税模式 (直接计算)';



  var znCoeff=getCoeff(ZN_COEFF,znGrade);

  var pbCoeff=getCoeff(PB_COEFF,pbGrade);



  document.getElementById('znGradeVal').textContent=znGrade.toFixed(1);

  document.getElementById('pbGradeVal').textContent=pbGrade.toFixed(1);

  document.getElementById('coeffZn').textContent=znCoeff.toFixed(1)+'%';

  document.getElementById('coeffPb').textContent=pbCoeff.toFixed(1)+'%';



  // Formula: (price/1.13) * coeff% * grade%  (TC is deducted from metal value)

  var znOrePrice=((znPrice/divider)-tcZn)*(znCoeff/100)*(znGrade/100);

  var pbOrePrice=((pbPrice/divider)-tcPb)*(pbCoeff/100)*(pbGrade/100);



  var totalOrePrice=0;

  var bd='';

  if (currentMode==='zn') {

    totalOrePrice=znOrePrice;

    bd='1#锌 '+znPrice.toLocaleString()+' ÷1.13 ×'+znCoeff.toFixed(1)+'% ×'+znGrade.toFixed(1)+'% - TC '+tcZn;

  } else if (currentMode==='pb') {

    totalOrePrice=pbOrePrice;

    bd='1#铅 '+pbPrice.toLocaleString()+' ÷1.13 ×'+pbCoeff.toFixed(1)+'% ×'+pbGrade.toFixed(1)+'% - TC '+tcPb;

  } else {

    totalOrePrice=znOrePrice+pbOrePrice;

    bd='锌部分: '+znOrePrice.toFixed(0)+' + 铅部分: '+pbOrePrice.toFixed(0);

  }



  document.getElementById('orePrice').innerHTML=totalOrePrice.toFixed(0)+'<span class="unit">元/吨</span>';

  document.getElementById('breakdown').textContent=bd;

}



// ===== Price fetch =====

function fetchPrices() {

  var apiUrl='https://api.fsxsymall.com/api/znpb-price';

  fetch(apiUrl+'?_='+Date.now(),{signal:AbortSignal.timeout(5000)})

    .then(function(r){return r.json();})

    .then(function(d){

      if(d.zn){znPrice=d.zn.price;updatePriceDisplay('Zn',d.zn,true);}

      if(d.pb){pbPrice=d.pb.price;updatePriceDisplay('Pb',d.pb,true);}

      calc();

    })

    .catch(function(){

      fetch('data/price.json?_='+Date.now())

        .then(function(r){return r.json();})

        .then(function(d){

          if(d.zn){znPrice=d.zn.price;updatePriceDisplay('Zn',d.zn,false);}

          if(d.pb){pbPrice=d.pb.price;updatePriceDisplay('Pb',d.pb,false);}

          calc();

        })

        .catch(function(){calc();});

    });

}



function updatePriceDisplay(metal,data,live) {

  var el=document.getElementById('price'+metal);

  var meta=document.getElementById('meta'+metal);

  var dot=document.getElementById('dot'+metal);

  el.innerHTML=data.price.toLocaleString()+'<span class="unit">元/吨</span>';

  meta.textContent=(live?'实时':'缓存')+' · '+data.source;

  dot.className='dot '+(live?'live':'cache');

}



// ===== Init =====

function init() {

  // Build presets

  [['presetsZn','znGrade',[30,35,40,45,50,55]],['presetsPb','pbGrade',[35,40,45,50,55,60,65,70]]].forEach(function(cfg){

    var el=document.getElementById(cfg[0]);

    cfg[2].forEach(function(g){

      var b=document.createElement('button'); b.textContent=g+'%';

      b.onclick=function(){document.getElementById(cfg[1]).value=g;calc();};

      el.appendChild(b);

    });

  });

  setMode('zn');

  fetchPrices();

  setInterval(fetchPrices,60000);

}

init();

</script>
